<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 For My Princess 💖</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffb6d9,#ffd6ec,#fff0f7);
overflow:hidden;
}

.login{
width:350px;
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 25px rgba(255,105,180,.4);
z-index:10;
}

h1{
color:#ff4f8b;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:12px;
border:1px solid #ff9ac5;
font-size:16px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#ff4f8b;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#ff2f75;
}

#message{
display:none;
padding:20px;
width:90%;
max-width:700px;
background:white;
border-radius:20px;
box-shadow:0 0 30px pink;
line-height:2;
font-size:20px;
white-space:pre-line;
}

.heart{
position:fixed;
top:-30px;
color:#ff4f8b;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div class="login" id="loginBox">
<h1>💖 Welcome 💖</h1>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login ❤️</button>

</div>

<div id="message">
<h2>💖 Welcome My Princess 💖</h2>
<p id="typing"></p>

<br>

<button id="next" style="display:none;">🌹 Continue 🌹</button>

</div>

<script>

const text=`ခလေးမလေးရေ... 🥺

ကိုယ်သဝန်တိုပြီး ပြောမိသွားတာ တကယ်တောင်းပန်ပါတယ်။

ကိုယ်ပြောလိုက်တဲ့စကားတွေကြောင့် မင်းစိတ်ထိခိုက်သွားရင် ကိုယ်တကယ်စိတ်မကောင်းပါဘူး။

ကိုယ်သဝန်တိုတာက မင်းကိုတန်ဖိုးထားလို့၊ ဆုံးရှုံးရမှာကြောက်လို့ပါ။

ဒါပေမယ့် အဲ့လိုစိတ်နဲ့ မင်းကိုနာကျင်အောင် မပြောသင့်ဘူးဆိုတာ ကိုယ်သိပါတယ်။

ဒီတစ်ခါတော့ ကိုယ့်ကိုခွင့်လွှတ်ပေးပါနော်။

နောက်ဆို စိတ်ကိုထိန်းပြီး မင်းကိုနားလည်အောင် ပိုကြိုးစားပါ့မယ်။

ကိုယ်က မင်းအပြုံးလေးကိုပဲ ပြန်မြင်ချင်တာပါ။ 🤍`;

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u=="ခလေးမ" && p=="Lugyi"){

document.getElementById("loginBox").style.display="none";
document.getElementById("message").style.display="block";

type();

}else{

alert("Username သို့မဟုတ် Password မှားနေပါတယ် 🥺");

}

}

let i=0;

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(type,45);

}else{

document.getElementById("next").style.display="block";

}

}

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*25)+"px";

h.style.animationDuration=(3+Math.random()*4)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),7000);

},250);

</script>

</body>
</html>
