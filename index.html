<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.login,.message{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
text-align:center;
width:90%;
max-width:450px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:18px;
}

button{
padding:12px 25px;
border:none;
background:#ff4d6d;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#ff1744;
}

.message{
display:none;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}

h2{
color:#ff1744;
margin-bottom:20px;
}

p{
font-size:18px;
line-height:1.8;
white-space:pre-line;
}

.heart{
position:fixed;
color:red;
font-size:25px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="login" id="login">
<h2>❤️ Login ❤️</h2>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div class="message" id="msg">

<h2>Welcome My Princess ❤️</h2>

<p id="text"></p>

</div>

<script>

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u=="ခလေးမ" && p=="Lugyi"){

document.getElementById("login").style.display="none";

document.getElementById("msg").style.display="block";

typeWriter();

hearts();

}else{

alert("Username (သို့) Password မှားနေပါတယ် 🥺");

}

}

const message=`ခလေးမလေးရေ... 🥺

ကိုယ်သဝန်တိုပြီး ပြောမိသွားတာ တကယ်တောင်းပန်ပါတယ်။ ကိုယ်ပြောလိုက်တဲ့စကားတွေကြောင့် မင်းစိတ်ထိခိုက်သွားရင် ကိုယ်တကယ်စိတ်မကောင်းပါဘူး။

ကိုယ်သဝန်တိုတာက မင်းကိုတန်ဖိုးထားလို့၊ ဆုံးရှုံးရမှာကြောက်လို့ပါ။ ဒါပေမယ့် အဲ့လိုစိတ်နဲ့ မင်းကိုနာကျင်အောင် မပြောသင့်ဘူးဆိုတာ ကိုယ်သိပါတယ်။

ဒီတစ်ခါတော့ ကိုယ့်ကိုခွင့်လွှတ်ပေးပါနော်။ နောက်ဆို စိတ်ကိုထိန်းပြီး မင်းကိုနားလည်အောင် ပိုကြိုးစားပါ့မယ်။

ကိုယ်က မင်းအပြုံးလေးကိုပဲ ပြန်မြင်ချင်တာပါ။ 🤍

❤️ I Love You Forever ❤️`;

let i=0;

function typeWriter(){

if(i<message.length){

document.getElementById("text").innerHTML+=message.charAt(i);

i++;

setTimeout(typeWriter,50);

}

}

function hearts(){

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},6000);

},300);

}

</script>

</body>
</html>
